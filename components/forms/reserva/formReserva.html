<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat&family=Playfair+Display&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="formReserva.css">
    <title>Formulario de reserva</title>
</head>

<body>

    <section class="form-container">

        <h2 class="titulo-form">Reserva tu cita</h2>

        <form 
            id="formReserva" 
            class="formulario"
            action="https://formspree.io/f/mkokrkew"
            method="POST">

            <div class="input-group">
                <input type="text" id="nombre" name="nombre" required placeholder="">
                <label>Nombre completo</label>
                <span class="error" id="errorNombre"></span>
            </div>

            <div class="input-group">
                <input type="email" id="correo" name="correo" required placeholder="">
                <label>Correo electrónico</label>
                <span class="error" id="errorCorreo"></span>
            </div>

            <div class="input-group telefono-group">
                <div class="telefono-flex">

                    <div class="telefono-codigo">
                        <select id="codigoPais" name="codigoPais" required>
                            <option value="" disabled selected></option>
                            <optgroup label="🌎 América">
                                <option value="+1">🇺🇸 EE.UU. (+1)</option>
                                <option value="+1">🇨🇦 Canadá (+1)</option>
                                <option value="+52">🇲🇽 México (+52)</option>
                                <option value="+54">🇦🇷 Argentina (+54)</option>
                                <option value="+55">🇧🇷 Brasil (+55)</option>
                                <option value="+56">🇨🇱 Chile (+56)</option>
                                <option value="+57">🇨🇴 Colombia (+57)</option>
                                <option value="+51">🇵🇪 Perú (+51)</option>
                                <option value="+58">🇻🇪 Venezuela (+58)</option>
                                <option value="+593">🇪🇨 Ecuador (+593)</option>
                                <option value="+591">🇧🇴 Bolivia (+591)</option>
                                <option value="+595">🇵🇾 Paraguay (+595)</option>
                                <option value="+598">🇺🇾 Uruguay (+598)</option>
                                <option value="+507">🇵🇦 Panamá (+507)</option>
                                <option value="+506">🇨🇷 Costa Rica (+506)</option>
                                <option value="+503">🇸🇻 El Salvador (+503)</option>
                                <option value="+502">🇬🇹 Guatemala (+502)</option>
                                <option value="+504">🇭🇳 Honduras (+504)</option>
                                <option value="+505">🇳🇮 Nicaragua (+505)</option>
                                <option value="+53">🇨🇺 Cuba (+53)</option>
                                <option value="+1">🇵🇷 Puerto Rico (+1)</option>
                                <option value="+509">🇭🇹 Haití (+509)</option>
                                <option value="+1">🇩🇴 República Dominicana (+1)</option>
                            </optgroup>
                            <optgroup label="🌍 África">
                                <option value="+27">🇿🇦 Sudáfrica (+27)</option>
                                <option value="+20">🇪🇬 Egipto (+20)</option>
                                <option value="+212">🇲🇦 Marruecos (+212)</option>
                                <option value="+234">🇳🇬 Nigeria (+234)</option>
                                <option value="+254">🇰🇪 Kenia (+254)</option>
                                <option value="+233">🇬🇭 Ghana (+233)</option>
                                <option value="+251">🇪🇹 Etiopía (+251)</option>
                                <option value="+258">🇲🇿 Mozambique (+258)</option>
                            </optgroup>
                            <optgroup label="🌏 Asia">
                                <option value="+86">🇨🇳 China (+86)</option>
                                <option value="+81">🇯🇵 Japón (+81)</option>
                                <option value="+82">🇰🇷 Corea del Sur (+82)</option>
                                <option value="+91">🇮🇳 India (+91)</option>
                                <option value="+62">🇮🇩 Indonesia (+62)</option>
                                <option value="+66">🇹🇭 Tailandia (+66)</option>
                                <option value="+84">🇻🇳 Vietnam (+84)</option>
                                <option value="+60">🇲🇾 Malasia (+60)</option>
                                <option value="+63">🇵🇭 Filipinas (+63)</option>
                                <option value="+65">🇸🇬 Singapur (+65)</option>
                                <option value="+971">🇦🇪 Emiratos Árabes (+971)</option>
                                <option value="+966">🇸🇦 Arabia Saudita (+966)</option>
                                <option value="+972">🇮🇱 Israel (+972)</option>
                                <option value="+90">🇹🇷 Turquía (+90)</option>
                            </optgroup>
                            <optgroup label="🇪🇺 Europa">
                                <option value="+34">🇪🇸 España (+34)</option>
                                <option value="+33">🇫🇷 Francia (+33)</option>
                                <option value="+49">🇩🇪 Alemania (+49)</option>
                                <option value="+39">🇮🇹 Italia (+39)</option>
                                <option value="+44">🇬🇧 Reino Unido (+44)</option>
                                <option value="+351">🇵🇹 Portugal (+351)</option>
                                <option value="+31">🇳🇱 Países Bajos (+31)</option>
                                <option value="+32">🇧🇪 Bélgica (+32)</option>
                                <option value="+41">🇨🇭 Suiza (+41)</option>
                                <option value="+46">🇸🇪 Suecia (+46)</option>
                                <option value="+47">🇳🇴 Noruega (+47)</option>
                                <option value="+45">🇩🇰 Dinamarca (+45)</option>
                                <option value="+358">🇫🇮 Finlandia (+358)</option>
                                <option value="+48">🇵🇱 Polonia (+48)</option>
                                <option value="+420">🇨🇿 República Checa (+420)</option>
                                <option value="+43">🇦🇹 Austria (+43)</option>
                                <option value="+353">🇮🇪 Irlanda (+353)</option>
                                <option value="+30">🇬🇷 Grecia (+30)</option>
                                <option value="+36">🇭🇺 Hungría (+36)</option>
                            </optgroup>
                            <optgroup label="🌏 Oceanía">
                                <option value="+61">🇦🇺 Australia (+61)</option>
                                <option value="+64">🇳🇿 Nueva Zelanda (+64)</option>
                                <option value="+679">🇫🇯 Fiyi (+679)</option>
                                <option value="+682">🇨🇰 Islas Cook (+682)</option>
                            </optgroup>
                        </select>
                        <label class="telefono-label">Código</label>
                    </div>

                    <div class="telefono-wrapper">
                        <input type="tel" id="telefono" name="telefono" required placeholder="">
                        <label class="telefono-label">Número</label>
                    </div>

                </div>
                <span class="error" id="errorTelefono"></span>
            </div>
            
            <div class="input-group">
                <select id="servicio" name="servicio" required>
                    <option value="" disabled selected></option>
                    <option value="Corte de cabello">✂️ Corte de cabello</option>
                    <option value="Coloración">🎨 Coloración</option>
                    <option value="Peinado">💇‍♀️ Peinado</option>
                    <option value="Tratamiento capilar">✨ Tratamiento capilar</option>
                    <option value="Maquillaje">💄 Maquillaje</option>
                    <option value="Barba y afinado">🧔 Barba y afinado</option>
                </select>
                <label>Servicio</label>
                <span class="error" id="errorServicio"></span>
            </div>

            <div class="input-group">
                <input type="date" id="fecha" name="fecha" required>
                <label>Fecha</label>
                <span class="error" id="errorFecha"></span>
            </div>

            <div class="input-group">
                <select id="hora" name="hora" required>
                    <option value="" disabled selected></option>
                    <option value="09:00">09:00 AM</option>
                    <option value="10:00">10:00 AM</option>
                    <option value="11:00">11:00 AM</option>
                    <option value="12:00">12:00 PM</option>
                    <option value="14:00">02:00 PM</option>
                    <option value="15:00">03:00 PM</option>
                    <option value="16:00">04:00 PM</option>
                    <option value="17:00">05:00 PM</option>
                    <option value="18:00">06:00 PM</option>
                </select>
                <label>Hora</label>
                <span class="error" id="errorHora"></span>
            </div>

            <button type="submit" class="btn-enviar">Reservar cita</button>

        </form>

        <div id="mensajeEnviando" class="mensaje-enviando" style="display: none;">
            ⏳ Enviando reserva... Espera un momento
        </div>

        <div id="mensajeExito" class="mensaje-exito" style="display: none;">
            ✅ ¡Reserva recibida! Te contactaremos por WhatsApp o correo para confirmar tu cita.
        </div>

    </section>

    <script src="formReserva.js"></script>

</body>
</html>

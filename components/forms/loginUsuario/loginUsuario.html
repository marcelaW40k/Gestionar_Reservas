<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat&family=Playfair+Display&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="loginUsuario.css">
    <title>Inicio de sesión</title>
</head>
<body>

    <section class="form-container">

        <h2 class="titulo-form">Iniciar sesión</h2>

        <form id="formLogin" class="formulario">

            <div class="input-group">
                <input type="email" id="email" name="email" required placeholder="">
                <label>Correo electrónico</label>
                <span class="error" id="errorEmail"></span>
            </div>

            <div class="input-group">
                <input type="password" id="password" name="password" required placeholder="">
                <label>Contraseña</label>
                <span class="error" id="errorPassword"></span>
            </div>

            <button type="submit" class="btn-login">Iniciar sesión</button>

        </form>

        <div class="registro-link">
            ¿No tienes cuenta? <a href="/pages/registro/registro.html" target="_top">Regístrate aquí</a>
        </div>

        <div id="mensajeBienvenida" class="mensaje-bienvenida" style="display: none;"></div>
        <div id="mensajeError" class="mensaje-error" style="display: none;"></div>

    </section>

    <script src="/assets/js/config.js"></script>
    <script src="loginUsuario.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro de Usuario | Style Factory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <link rel="stylesheet" href="/components/footer/footer.css">
    <link rel="stylesheet" href="/components/navbar/navbar.css">
    <link rel="stylesheet" href="registro.css" />
</head>

<body>

    <header id="header" class="sticky-top"></header>

    <main class="container py-5 container-main">
        <div class="card">
            <div class="card-body content-body">
                <div class="row">
                    <!-- Columna izquierda: Información de beneficios -->
                    <div class="col-md-6 info-registro">
                        <h2>Gestiona tus servicios</h2>
                        <p>Ten el control de todos tus reservas y recibe notificaciones con el seguimiento</p>

                        <div class="beneficio">
                            <i class="fas fa-crown"></i>
                            <div>
                                <h3>Únete a Premium!</h3>
                                <p>Forma parte de nuestra comunidad y disfruta de todas las ventajas</p>
                            </div>
                        </div>

                        <div class="beneficio">
                            <i class="fas fa-heart"></i>
                            <div>
                                <h3>Lista de servicios personalizada</h3>
                                <p>Guarda tus servicios favoritos en las listas de servicios personalizadas</p>
                            </div>
                        </div>
                    </div>

                    <!-- Columna derecha: Formulario de registro -->
                    <div class="col-md-6">
                        <iframe src="../../components/forms/registroUsuario/registroUsuario.html" 
                                class="form-iframe"></iframe>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="https://kit.fontawesome.com/da49b4fb7a.js" crossorigin="anonymous"></script>
    <script src="registro.js" defer></script>

</body>

</html>

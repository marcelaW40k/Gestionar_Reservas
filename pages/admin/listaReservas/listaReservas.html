<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lista de Reservas</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../../../assets/css/main.css">
  <link rel="stylesheet" href="/components/navbarAdmin/navbar_Admin.css">
  <link rel="stylesheet" href="/pages/admin/listaReservas/listaReservas.css">
</head>

<body>
  <div id="navbarAdmin-placeholder"></div>

  <main class="admin-lista-reservas-main">
    <div class="admin-lista-reservas-panel">
      <section class="seccion-lista-reservas">
        <div class="cabecera-lista-reservas">
          <h2>LISTA DE RESERVAS</h2>
          <div class="linea-cabecera"></div>
        </div>

        <div class="contenedor-tabla-reservas">
          <table class="table table-striped tabla-lista-reservas">
            <thead>
              <tr>
                <th>ID</th>
                <th>CLIENTE</th>
                <th>PROFESIONAL</th>
                <th>SERVICIO</th>
                <th>FECHA</th>
                <th>HORA</th>
                <th>ESTADO</th>
                <th>ACCIONES</th>
              </tr>
            </thead>
            <!-- tbody vacío — se llena desde listaReservas.js -->
            <tbody id="tabla-reservas"></tbody>
          </table>
        </div>

        <!-- ✅ Modal confirmar eliminación -->
        <div class="modal fade" id="modalEliminarReserva" tabindex="-1">
          <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
              <div class="modal-header">
                <h5 class="modal-title">Confirmar eliminación</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
              </div>
              <div class="modal-body">
                ¿Estás segura de que deseas eliminar esta reserva?
              </div>
              <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button class="btn btn-danger" id="btn-confirmar-eliminar-reserva">Eliminar</button>
              </div>
            </div>
          </div>
        </div>

      </section>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <!-- ✅ type="module" para soportar imports -->
  <script type="module" src="./listaReservas.js"></script>
</body>

</html>

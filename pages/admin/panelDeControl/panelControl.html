  <!-- Bootstrap -->

  <!-- estilos -->

  <link rel="stylesheet" href="/components/navbarAdmin/navbar_Admin.css">

<body>

  <!--sidebar -->

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Modal -->
  <div class="modal fade" id="modalSalir" tabindex="-1" aria-labelledby="modalSalirLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalSalirLabel">Confirmar salida</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body">
          ¿Quieres salir del panel administrador?
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-danger" id="btnSalirConfirmado">Salir</button>
        </div>
      </div>
    </div>
  </div>


</body>

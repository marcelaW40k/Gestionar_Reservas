<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contacto</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
  <link rel="stylesheet" href="/components/footer/footer.css">
  <link rel="stylesheet" href="/components/navbar/navbar.css">
  <link rel="stylesheet" href="contact.css" />
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/components//forms/contacto/formContacto.css">
</head>

<body>
  
  <header id="header" class="sticky-top"></header>
  <main class="container-custom py-5">
    <div class=" card h-60vh">
      <div class="card-body content-body">
        <div class="row">
          <div class="col-lg-6">
            <div class="carousel slide" data-bs-ride="carousel" data-bs-interval="2500"  data-bs-pause="hover">
              <div class="carousel-inner">
                <div class="carousel-item active">
                  <img src="https://i.pinimg.com/1200x/ce/4e/08/ce4e08428382942df4c291b100abac6e.jpg"
                    class="d-block w-100" alt="..." />
                  <div class="carousel-caption">
                    <h4>Resalta tu belleza natural</h4>
                    <p >Cuidamos cada detalle para que luzcas increíble.</p>
                  </div>
                </div>
                <div class="carousel-item">
                  <img src="https://i.pinimg.com/736x/24/d3/4a/24d34a0347d21010fa30e1beeb6e2fb9.jpg"
                    class="d-block w-100" alt="..." />
                  <div class="carousel-caption">
                    <h4>Expertos en tu estilo</h4>
                    <p>Manos profesionales que transforman tu look.</p>
                  </div>
                </div>
                <div class="carousel-item">
                  <img src="https://i.pinimg.com/736x/13/d9/c9/13d9c9557c20368b767a7675b6e5ade3.jpg"
                    class="d-block w-100"  alt="..." />
                  <div class="carousel-caption">
                    <h4>Tu cabello, nuestra pasión</h4>
                    <p>Productos de calidad y resultados que enamoran.</p>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="col-lg-6">
            <div id="form-contacto"></div>
          </div>
        </div>
      </div>
    </div>

    <div id="map-placeholder"></div>

  </main>

  <div id="footer-placeholder"></div>

  <!-- 1. Google Maps SIN callback -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCkVMtIfvyL6zRCUFZbK2LgDZntKlGDOjg&loading=async"
    defer></script>
  <!-- 2. JS del mapa, después de Google Maps -->
  <script src="/components/maps/maps.js" defer></script>
  <!-- 3. Bootstrap -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <!-- 4. Font Awesome -->
  <script src="https://kit.fontawesome.com/da49b4fb7a.js" crossorigin="anonymous"></script>
  <!-- 5. JS de la página -->
  <script src="contact.js" defer></script>
  <script type="module" src="/assets/js/main.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Servicios - Style Factory</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="stylesheet" href="../../components/navbar/navbar.css">
    <link rel="stylesheet" href="../../components/footer/footer.css">
    <link rel="stylesheet" href="catalogoServicios.css">
</head>
<body>
    <header id="header" class="sticky-top"></header>

    <main class="catalogo-main">
        <div class="container-custom">
            <div class="catalogo-header">
                <span class="catalogo-eyebrow">Style Factory</span>
                <h1>Nuestros servicios</h1>
                <div class="header-line"></div>
                <p>Descubre los tratamientos y servicios que tenemos para ti. Reserva en línea en pocos pasos.</p>
            </div>

            <div class="catalogo-filtros-wrap">
                <p class="catalogo-filtros-label">Filtrar por categoría</p>
                <div id="catalogo-filtros" class="catalogo-filtros" role="tablist" aria-label="Filtrar por tipo de servicio"></div>
            </div>

            <div id="catalogo-vacio" class="catalogo-vacio" style="display: none;">
                <i class="fa-solid fa-spa" aria-hidden="true"></i>
                <p>No hay servicios en esta categoría por ahora.</p>
                <button type="button" class="btn-filtro-todos" id="btn-ver-todos">Ver todos los servicios</button>
            </div>

            <div id="cards-container" class="cards-grid"></div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>


    <script src="https://kit.fontawesome.com/da49b4fb7a.js" crossorigin="anonymous"></script>
    <script type="module" src="catalogoServicios.js"></script>

</body>
</html>
